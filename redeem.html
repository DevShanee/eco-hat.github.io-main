<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECO-HAT | Redeem Supplies</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        #qty-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .qty-controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; }
        .qty-btn { background: #eee; border: none; padding: 10px 18px; font-size: 1.5rem; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .qty-btn:hover { background: #ddd; }
        .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; background: #eee; }
        .qty-input { width: 60px; text-align: center; font-size: 1.2rem; padding: 8px; border: 2px solid #eee; border-radius: 8px; font-weight: bold; }
        
        :root { --maroon: #8B0000; --gold: #DAA520; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        header { 
            background: var(--maroon); 
            color: white; 
            padding: 12px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .header-logo h1 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; }

        .back-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.4); 
            color: white; 
            padding: 8px 18px; 
            border-radius: 6px; 
            cursor: pointer;
            font-size: 0.8rem;
            width: auto !important; /* Prevent stretching */
            white-space: nowrap;
        }

        .container { padding: 30px; max-width: 900px; margin: auto; }

        .points-strip { 
            background: white; 
            padding: 20px 30px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
            border-left: 6px solid var(--gold);
        }
        .points-value { margin: 0; font-size: 2.2rem; color: var(--maroon); }

        .supply-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .supply-card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-align: center; 
            border: 1px solid #eee; 
            transition: 0.3s;
        }
        .supply-card:hover { transform: translateY(-5px); }
        .redeem-btn { 
            background: var(--maroon); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .redeem-btn:disabled { background: #ddd; cursor: not-allowed; }

        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 300px; }
    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <span style="font-size:1.5rem;">🛍️</span>
            <h1>REDEEM SUPPLIES</h1>
        </div>
        <button onclick="location.href='dashboard.html'" class="back-btn">Back to Dashboard</button>
    </header>

    <div class="container">
        <div class="points-strip">
            <div>
                <small style="color:#888; font-weight:bold; text-transform:uppercase;">AVAILABLE ECO-PUNTOS</small>
                <h1 class="points-value" id="user-points">0</h1>
            </div>
            <span style="font-size:1.5rem;">🪙</span>
        </div>

        <div class="supply-grid" id="supply-list"></div>
    </div>

    <!-- Quantity Selection Modal -->
    <div id="qty-modal">
        <div class="modal-content">
            <h3 style="color:var(--maroon); margin-top:0;" id="qty-item-name">Item Name</h3>
            
            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; font-size: 0.9rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>Available Puntos:</span>
                    <b id="qty-user-points" style="color:var(--gold);">0</b>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Cost per unit:</span>
                    <b id="qty-item-price">0</b>
                </div>
            </div>

            <div class="qty-controls">
                <button id="btn-qty-minus" class="qty-btn" onclick="changeQty(-1)">-</button>
                <input type="number" id="qty-value" class="qty-input" value="1" oninput="handleManualInput(this.value)">
                <button id="btn-qty-plus" class="qty-btn" onclick="changeQty(1)">+</button>
            </div>

            <div style="margin: 20px 0; font-size: 1.1rem; border-top: 1px dashed #ccc; padding-top: 15px;">
                Total Cost: <b id="qty-total-cost" style="color:var(--maroon); font-size: 1.3rem;">0</b> Puntos
            </div>

            <div style="display:flex; gap:10px;">
                <button onclick="document.getElementById('qty-modal').style.display='none'" class="redeem-btn" style="background:#666;">Cancel</button>
                <button id="qty-confirm-btn" class="redeem-btn" onclick="confirmQuantity()">Generate QR</button>
            </div>
        </div>
    </div>

    <div id="qr-modal">
        <div class="modal-content">
            <h3 style="color:var(--maroon);">Redemption QR</h3>
            <div id="qrcode" style="margin:20px auto; display:flex; justify-content:center;"></div>
            <p id="txn-display" style="font-family:monospace; font-weight:bold;"></p>
            <button onclick="document.getElementById('qr-modal').style.display='none'" class="redeem-btn" style="background:#444;">Close</button>
        </div>
    </div>

    <script type="module">
        import Storage from './js/services/Storage.js';
        
        // Ensure user is logged in
        const localUser = Storage.getCurrentUser();
        if(!localUser) window.location.href = "index.html";

        const supplies = [
            { name: "Notebook", price: 50, icon: "📓" },
            { name: "Ballpen", price: 20, icon: "🖊️" },
            { name: "Pencil", price: 15, icon: "✏️" },
            { name: "Scissors", price: 60, icon: "✂️" },
            { name: "Crayons", price: 80, icon: "🖍️" },
            { name: "Ruler", price: 25, icon: "📏" }
        ];

        let currentPoints = 0;

        async function loadRedeemPage() {
            try {
                const dbData = await Storage.getUserHistory(localUser.studentNumber);
                currentPoints = dbData.points;
                document.getElementById('user-points').textContent = currentPoints;

                const list = document.getElementById('supply-list');
                list.innerHTML = ""; 

                supplies.forEach(s => {
                    const canAfford = currentPoints >= s.price;
                    list.innerHTML += `
                        <div class="supply-card">
                            <span style="font-size:3rem;">${s.icon}</span>
                            <h4>${s.name}</h4>
                            <p style="color:var(--maroon); font-weight:bold;">${s.price} Puntos</p>
                            <!-- Changed to openQtyModal -->
                            <button class="redeem-btn" ${canAfford ? '' : 'disabled'} onclick="openQtyModal('${s.name}', ${s.price})">Redeem Item</button>
                        </div>`;
                });
            } catch (error) {
                alert("Failed to load your latest points.");
            }
        }

        // --- QUANTITY MODAL LOGIC ---
        window.selectedItem = null;
        window.selectedPrice = 0;
        window.currentQty = 1;

        window.openQtyModal = (name, price) => {
            window.selectedItem = name;
            window.selectedPrice = price;
            window.currentQty = 1;
            
            document.getElementById('qty-item-name').textContent = `Redeem ${name}`;
            document.getElementById('qty-user-points').textContent = currentPoints;
            document.getElementById('qty-item-price').textContent = price;
            
            updateQtyUI();
            document.getElementById('qty-modal').style.display = 'flex';
        };

        window.changeQty = (delta) => {
            const maxAfford = Math.floor(currentPoints / window.selectedPrice);
            let newQty = window.currentQty + delta;
            
            // Prevent going below 1, or selecting more than they can afford
            if (newQty >= 1 && newQty <= maxAfford) {
                window.currentQty = newQty;
                updateQtyUI();
            }
        };

        // --- REAL-TIME TYPING CALCULATION ---
        window.handleManualInput = (val) => {
            const maxAfford = Math.floor(currentPoints / window.selectedPrice);
            let newQty = parseInt(val);

            // If they delete the number entirely, temporarily show 0 cost
            if (isNaN(newQty) || newQty < 1) {
                document.getElementById('qty-total-cost').textContent = "0";
                window.currentQty = 1; // Fallback safety
                return;
            }

            // If they type a number too high, auto-correct it to their max affordable amount
            if (newQty > maxAfford) {
                newQty = maxAfford;
                document.getElementById('qty-value').value = maxAfford; 
            }

            // Update the state and perform the dynamic calculation
            window.currentQty = newQty;
            const totalCost = window.currentQty * window.selectedPrice;
            document.getElementById('qty-total-cost').textContent = totalCost;
        };

        window.updateQtyUI = () => {
            // Update the input box and total cost text
            document.getElementById('qty-value').value = window.currentQty;
            const total = window.currentQty * window.selectedPrice;
            document.getElementById('qty-total-cost').textContent = total;

            // NEW: Calculate max affordable quantity
            const maxAfford = Math.floor(currentPoints / window.selectedPrice);
            
            // NEW: Lock or unlock the buttons dynamically
            document.getElementById('btn-qty-minus').disabled = (window.currentQty <= 1);
            document.getElementById('btn-qty-plus').disabled = (window.currentQty >= maxAfford);
        };

        window.confirmQuantity = () => {
            document.getElementById('qty-modal').style.display = 'none';
            // Pass the quantity to the QR generator
            showQR(window.selectedItem, window.selectedPrice, window.currentQty);
        };

        // --- QR GENERATOR LOGIC ---
        window.showQR = (name, unitPrice, qty) => {
            const txnId = Math.floor(1000 + Math.random() * 9000);
            const totalCost = unitPrice * qty; // Send the TOTAL cost to the database
            
            document.getElementById('qr-modal').style.display = 'flex';
            document.getElementById('txn-display').textContent = `TXN-ID: ${txnId} | ${qty}x ${name}`;
            
            const qrData = JSON.stringify({
                student_id: localUser.studentNumber,
                item_name: name,
                price: totalCost, 
                qty: qty, // NEW: Pack the quantity into the QR code
                txn: txnId
            });

            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { 
                text: qrData, width: 220, height: 220, colorDark: "#000000" 
            });
        };

        loadRedeemPage();
    </script>
</body>
</html>
